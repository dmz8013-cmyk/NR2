{% extends "layouts/base.html" %}

{% block title %}브리핑 수정 - NR2 Network{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto px-4 py-8">
    <a href="{{ url_for('briefings.detail', briefing_id=briefing.id) }}" class="inline-flex items-center text-sm text-gray-500 hover:text-gray-700 mb-6">
        <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
        </svg>
        돌아가기
    </a>

    <h1 class="text-2xl font-bold text-gray-900 mb-6">브리핑 수정</h1>

    <form method="POST" class="space-y-6">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">유형</label>
            <span class="text-xs px-3 py-1 rounded-full text-white font-semibold" style="background-color: {{ briefing.type_badge_color }}">
                {{ briefing.type_label }}
            </span>
            <span class="text-xs text-gray-400 ml-2">{{ briefing.created_at|kst('%Y-%m-%d %H:%M') }}</span>
        </div>

        <div>
            <label for="title" class="block text-sm font-medium text-gray-700 mb-1">제목</label>
            <input type="text" name="title" id="title" value="{{ briefing.title or '' }}"
                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
        </div>

        <div>
            <label for="content" class="block text-sm font-medium text-gray-700 mb-1">본문</label>
            <textarea name="content" id="content" rows="20"
                      class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent font-mono text-sm"
                      style="white-space: pre-wrap; line-height: 1.6;">{{ briefing.content }}</textarea>
        </div>

        <div class="flex gap-3">
            <button type="submit" class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-medium">
                저장
            </button>
            <a href="{{ url_for('briefings.detail', briefing_id=briefing.id) }}"
               class="px-6 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 font-medium">
                취소
            </a>
        </div>
    </form>
</div>
{% endblock %}
