{% extends "layouts/base.html" %}

{% block title %}이메일 인증 - NR2 Network{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gradient-to-r from-yellow-50 to-orange-50 py-12 px-4">
    <div class="max-w-md w-full">
        <div class="bg-white rounded-2xl shadow-2xl p-8 text-center">
            <div class="mb-6">
                <img src="{{ url_for('static', filename='images/nureongi.jpg') }}"
                     class="w-20 h-20 rounded-full object-cover mx-auto shadow-md">
            </div>
            <h2 class="text-2xl font-bold text-gray-800 mb-2">이메일 인증이 필요합니다</h2>
            <p class="text-gray-600 mb-6">
                <strong>{{ current_user.email }}</strong>로<br>
                인증 메일을 발송했습니다.<br>
                메일함을 확인해주세요.
            </p>

            <div class="bg-amber-50 border border-amber-200 rounded-lg p-4 mb-6 text-sm text-amber-800">
                메일이 보이지 않으면 <strong>스팸함</strong>을 확인해주세요.
            </div>

            <a href="{{ url_for('auth.resend_verification') }}"
               class="inline-block w-full bg-amber-600 hover:bg-amber-700 text-white font-bold py-3 px-6 rounded-lg transition mb-3">
                인증 메일 재발송
            </a>

            <a href="{{ url_for('auth.logout') }}"
               class="inline-block text-gray-500 hover:text-gray-700 text-sm">
                다른 이메일로 가입하기
            </a>
        </div>
    </div>
</div>
{% endblock %}
