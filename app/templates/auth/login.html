{% extends "layouts/base.html" %}

{% block title %}로그인 - NR2 Network{% endblock %}

{% block main_class %}{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-[#FAFAF8] py-12 px-4">
    <div class="w-full" style="max-width:900px;">
        <div class="md:flex overflow-hidden" style="border-radius:12px; box-shadow:0 4px 40px rgba(0,0,0,0.08);">

            <!-- 좌측: 누렁이 이미지 -->
            <div class="hidden md:block md:w-[480px] relative flex-shrink-0">
                <img src="{{ url_for('static', filename='images/nureongi.jpg') }}"
                     alt="누렁이"
                     class="w-full h-full object-cover">
                <!-- 하단 오버레이 -->
                <div class="absolute inset-x-0 bottom-0 bg-gradient-to-t from-black/70 to-transparent p-8">
                    <p class="text-white text-[14px] tracking-[0.15em] uppercase font-serif-kr">NR2 NETWORK</p>
                    <p class="text-white text-[22px] font-serif-kr font-bold mt-1">당신이 직접 판단하는 뉴스</p>
                </div>
            </div>

            <!-- 우측: 로그인 폼 -->
            <div class="flex-1 bg-white p-10 flex flex-col justify-center" style="min-width:0;">
                <div class="max-w-[340px] mx-auto w-full">
                    <p class="font-serif-kr text-[28px] font-bold text-[#1a1a1a] mb-1">NR2</p>
                    <h1 class="font-serif-kr text-[24px] font-bold text-[#1a1a1a] mb-8">로그인</h1>

                    <form method="POST" action="{{ url_for('auth.login') }}" class="space-y-6">
                        <div>
                            <label class="block text-[13px] text-[#767676] mb-2">이메일</label>
                            <input type="email" name="email" required
                                   class="w-full px-0 py-3 border-0 border-b-2 border-[#e0e0e0] focus:border-[#1a1a1a] focus:ring-0 bg-transparent text-[15px] text-[#1a1a1a] transition outline-none"
                                   placeholder="your@email.com">
                        </div>

                        <div>
                            <label class="block text-[13px] text-[#767676] mb-2">비밀번호</label>
                            <input type="password" name="password" required
                                   class="w-full px-0 py-3 border-0 border-b-2 border-[#e0e0e0] focus:border-[#1a1a1a] focus:ring-0 bg-transparent text-[15px] text-[#1a1a1a] transition outline-none"
                                   placeholder="비밀번호">
                        </div>

                        <button type="submit"
                                class="w-full bg-[#1a1a1a] hover:bg-[#333] text-white font-bold py-3.5 text-[14px] transition"
                                style="border-radius:4px;">
                            로그인하기
                        </button>
                    </form>

                    <div class="mt-4 text-center">
                        <a href="{{ url_for('auth.forgot_password') }}" class="text-[13px] text-[#767676] hover:text-[#1a1a1a]">
                            비밀번호를 잊으셨나요?
                        </a>
                    </div>

                    <div class="mt-4 text-center">
                        <p class="text-[13px] text-[#767676]">
                            아직 회원이 아니신가요?
                            <a href="{{ url_for('auth.register') }}" class="text-[#C1121F] hover:text-[#8b0d16] font-semibold ml-1">
                                30초 회원가입 &rarr;
                            </a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
