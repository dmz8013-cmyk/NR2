{% extends "layouts/base.html" %}

{% block title %}비밀번호 재설정 - NR2 Network{% endblock %}

{% block main_class %}{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-[#FAFAF8] py-12 px-4">
    <div class="w-full" style="max-width:480px;">
        <div class="bg-white p-10" style="border-radius:12px; box-shadow:0 4px 40px rgba(0,0,0,0.08);">
            <p class="font-serif-kr text-[28px] font-bold text-[#1a1a1a] mb-1">NR2</p>
            <h1 class="font-serif-kr text-[24px] font-bold text-[#1a1a1a] mb-8">새 비밀번호 설정</h1>

            <form method="POST" class="space-y-6">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div>
                    <label class="block text-[13px] text-[#767676] mb-2">새 비밀번호</label>
                    <input type="password" name="password" required
                           class="w-full px-0 py-3 border-0 border-b-2 border-[#e0e0e0] focus:border-[#1a1a1a] focus:ring-0 bg-transparent text-[15px] text-[#1a1a1a] transition outline-none"
                           placeholder="새 비밀번호">
                </div>

                <div>
                    <label class="block text-[13px] text-[#767676] mb-2">비밀번호 확인</label>
                    <input type="password" name="password_confirm" required
                           class="w-full px-0 py-3 border-0 border-b-2 border-[#e0e0e0] focus:border-[#1a1a1a] focus:ring-0 bg-transparent text-[15px] text-[#1a1a1a] transition outline-none"
                           placeholder="비밀번호 확인">
                </div>

                <button type="submit"
                        class="w-full bg-[#1a1a1a] hover:bg-[#333] text-white font-bold py-3.5 text-[14px] transition"
                        style="border-radius:4px;">
                    비밀번호 변경하기
                </button>
            </form>

            <div class="mt-8 text-center">
                <a href="{{ url_for('auth.login') }}" class="text-[13px] text-[#767676] hover:text-[#1a1a1a]">
                    &larr; 로그인으로 돌아가기
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
