{% extends "layouts/base.html" %}

{% block title %}회원가입 - NR2 Network{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gradient-to-r from-yellow-50 to-orange-50 py-12 px-4">
    <div class="max-w-4xl w-full">
        <div class="bg-white rounded-2xl shadow-2xl overflow-hidden">
            <div class="md:flex">
                <!-- 누렁이 이미지 섹션 -->
                <div class="md:w-1/2 bg-yellow-100 p-8 flex items-center justify-center">
                    <div class="text-center">
                        <img src="{{ url_for('static', filename='images/nureongi.jpg') }}"
                             alt="누렁이"
                             class="rounded-3xl shadow-xl mb-4 w-full max-w-sm">
                        <h2 class="text-2xl font-bold text-gray-800 mb-2">🐕 누렁이방에 오신 것을 환영합니다!</h2>
                        <p class="text-gray-600">30초면 가입 완료! 💛</p>
                    </div>
                </div>

                <!-- 회원가입 폼 -->
                <div class="md:w-1/2 p-8">
                    <h1 class="text-3xl font-bold text-gray-900 mb-6 text-center">회원가입</h1>

                    <form method="POST" action="{{ url_for('auth.register') }}" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">닉네임 (2~50자)</label>
                            <input type="text" name="nickname" required minlength="2" maxlength="50"
                                   class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-yellow-500 focus:border-transparent"
                                   placeholder="사용할 닉네임">
                            <p class="text-sm text-gray-500 mt-1">※ 한글, 영문, 숫자 가능</p>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">이메일</label>
                            <input type="email" name="email" required
                                   class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-yellow-500 focus:border-transparent"
                                   placeholder="your@email.com">
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">직군 선택</label>
                            <select name="job_category" required
                                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-yellow-500 focus:border-transparent">
                                <option value="public">행인 (일반)</option>
                                <option value="media">언론인 (기자/PD/인턴 등)</option>
                                <option value="congress">국회 (보좌진/당직자/사무처)</option>
                                <option value="govt">정부 (공무원/공공기관/공기업)</option>
                                <option value="corp">기업 (홍보/대관/임원/일반)</option>
                            </select>
                            <p class="text-sm text-gray-500 mt-1">※ 직군별 전용 라운지에 접근할 수 있습니다</p>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">비밀번호 (6자 이상)</label>
                            <input type="password" name="password" required minlength="6"
                                   class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-yellow-500 focus:border-transparent"
                                   placeholder="최소 6자">
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">비밀번호 확인</label>
                            <input type="password" name="password_confirm" required minlength="6"
                                   class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-yellow-500 focus:border-transparent"
                                   placeholder="비밀번호 재입력">
                        </div>

                        <button type="submit"
                                class="w-full bg-yellow-500 hover:bg-yellow-600 text-white font-bold py-3 rounded-lg transition shadow-lg">
                            🎉 가입하기
                        </button>
                    </form>

                    <div class="mt-6">
                        <div class="bg-yellow-50 border border-yellow-200 rounded-lg p-4">
                            <h3 class="font-bold text-sm mb-2">💬 회원 가입 혜택</h3>
                            <ul class="text-sm text-gray-700 space-y-1">
                                <li>✅ 자유롭게 글 작성</li>
                                <li>✅ 댓글 참여</li>
                                <li>✅ 좋아요 표시</li>
                            </ul>
                        </div>
                    </div>

                    <!-- 구분선 -->
                    <div class="flex items-center my-4">
                        <div class="flex-1 border-t border-gray-200"></div>
                        <span class="px-3 text-xs text-gray-400">또는</span>
                        <div class="flex-1 border-t border-gray-200"></div>
                    </div>

                    <!-- Google 회원가입 -->
                    <a href="{{ url_for('auth.google_login') }}"
                       class="w-full flex items-center justify-center gap-3 border border-gray-300 hover:bg-gray-50 py-3 rounded-lg text-sm text-gray-700 font-medium transition">
                        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59a14.5 14.5 0 0 1 0-9.18l-7.98-6.19a24.08 24.08 0 0 0 0 21.56l7.98-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
                        Google로 가입하기
                    </a>

                    <div class="mt-4 text-center">
                        <p class="text-gray-600 text-sm">
                            이미 계정이 있으신가요?
                            <a href="{{ url_for('auth.login') }}" class="text-yellow-600 hover:text-yellow-700 font-semibold">
                                로그인 →
                            </a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
