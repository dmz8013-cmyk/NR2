{% extends "layouts/base.html" %}

{% block title %}500 - 서버 오류{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center" style="background:#FAFAF8;">
    <div style="text-align:center;padding:40px 20px;">
        <img src="/static/images/nureongi.jpg" alt="누렁이"
             style="width:120px;height:120px;border-radius:50%;object-fit:cover;margin:0 auto 24px;display:block;">
        <h1 style="color:#C87941;font-size:80px;font-weight:700;margin:0 0 16px;line-height:1;">500</h1>
        <p style="color:#1a1a1a;font-size:18px;font-weight:600;margin:0 0 32px;">
            누렁이가 잠시 쉬고 있어요. 서버 오류가 발생했습니다
        </p>
        <a href="{{ url_for('main.index') }}"
           style="display:inline-block;background:#1A1A2E;color:white;padding:12px 32px;border-radius:8px;text-decoration:none;font-weight:600;font-size:14px;border:1px solid #C87941;transition:opacity 0.2s;">
            홈으로 돌아가기
        </a>
    </div>
</div>
{% endblock %}
